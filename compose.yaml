services:
  patriotindex-database:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PW}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - observability
  
  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PW}
    ports:
      - "8080:80"    # Seq web UI  → http://localhost:8080
    volumes:
      - seq-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otelcollector
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
    depends_on:
      seq:
        condition: service_healthy
    networks:
      - observability

  patriotindex-scheduler:
    build:
      context: .
      dockerfile: PatriotIndex.Scheduler/Dockerfile
    container_name: pischeduler
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - SEQ_URL=http://seq
      - OTEL_SERVICE_NAME=PatriotIndex.Scheduler
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - ConnectionStrings__PatriotIndexDb=Host=patriotindex-database;Port=5432;Database=${PG_DB};Username=${PG_USER};Password=${PG_PW};Timeout=30;Command Timeout=30;
      - ApiKey=${API_KEY}
      - ApiBaseUrl=${API_BASE_URL}
    depends_on:
      seq:
        condition: service_healthy
      patriotindex-database:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "5050:8080"
    networks:
      - observability

volumes:
  pgdata:
    driver: local
  seq-data:
    driver: local

networks:
  observability:
    driver: bridge

